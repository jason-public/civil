<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시민주권시대 남양주 대전환</title>
    
    <!-- 폰트 로드 (Pretendard) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v3.2.1/dist/web/static/pretendard.css" />
    
    <!-- GSAP (텍스트 애니메이션용) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #06101e;
            color: #ffffff;
        }
        
        #background-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-image: url('img/first.png'); /* 제공된 이미지 경로 */
            background-size: cover;
            background-position: center;
        }

        /* 배경 이미지 위에 어두운 오버레이 추가 (가독성 확보) */
        #background-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35); /* 0.35 오파시티의 어두운 레이어 */
        }


        
        .content {
            position: absolute;
            top: 50%;
            left: 20%; /* 텍스트를 왼쪽으로 이동하여 인물을 가리지 않음 */
            transform: translateY(-50%);
            z-index: 2;
            text-align: left; /* 텍스트 정렬 변경 */
            width: 60%;
            pointer-events: none;
        }
        
        /* 시민주권시대 글자 크기 대폭 확대 (이전 요청 유지) */
        .subtitle {
            font-size: 3.5rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            margin-bottom: 0.8rem; /* 여백 조정 */
            opacity: 0;
            color: #ffffff; /* 흰색으로 통일 */
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.7); /* 따뜻한 느낌의 드롭 섀도우 */
        }
        
        .title {
            font-size: 5.5rem;
            font-weight: 900;
            letter-spacing: 0.05em;
            margin: 0;
            display: flex;
            justify-content: flex-start; /* 왼쪽 정렬 */
            gap: 20px; /* 자간 조정 */
            flex-wrap: wrap;
            text-shadow: 0 6px 15px rgba(0, 0, 0, 0.8);
        }
        
        .word {
            display: inline-flex;
            overflow: hidden;
        }
        
        .char {
            display: inline-block;
            transform: translateY(100%);
            opacity: 0;
            background: #ffffff; /* 흰색 단색으로 통일 */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
            cursor: default;
        }
        
        /* 부드러운 흰색 호버 효과 (이전 효과 유지 및 조정) */
        .char:hover {
            transform: scale(1.2) translateY(-8px) !important; /* 호버 시 조금 더 크게 */
            text-shadow: 0 0 30px rgba(255, 255, 255, 1); /* 더 강한 반짝임 */
            -webkit-text-fill-color: #fff;
        }
        
        /* 모바일 환경 대응 크기 조정 */
        @media (max-width: 768px) {
            .content { left: 10%; width: 80%; text-align: center; }
            .subtitle { font-size: 2rem; margin-bottom: 0.5rem; text-shadow: 0 2px 5px rgba(0, 0, 0, 0.6); }
            .title { font-size: 3rem; gap: 10px; justify-content: center; text-shadow: 0 3px 8px rgba(0, 0, 0, 0.7); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.35; }
            50% { opacity: 0.75; }
        }
        .skip-helper {
            animation: pulse 2.5s infinite;
        }
    </style>
</head>
<body>
    <!-- 배경 이미지 컨테이너 -->
    <div id="background-container"></div>
    


    <!-- 메인 텍스트 컨테이너 -->
    <div class="content">
        <div class="subtitle">시민주권시대</div>
        <div class="title">
            <div class="word">
                <span class="char">남</span><span class="char">양</span><span class="char">주</span>
            </div>
            <div class="word">
                <span class="char">대</span><span class="char">전</span><span class="char">환</span>
            </div>
        </div>
    </div>

    <!-- 건너뛰기 안내 메시지 -->
    <div class="skip-helper" style="position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 0.95rem; font-weight: 500; color: rgba(255, 255, 255, 0.5); pointer-events: none; letter-spacing: 0.05em; text-align: center; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);">
        화면을 클릭하면 메인 화면으로 이동합니다
    </div>

    <script>
        // 이미지 로딩을 기다리지 않고 HTML DOM이 완성되자마자 즉시 실행되도록 변경
        document.addEventListener("DOMContentLoaded", () => {
            const tl = gsap.timeline();
            


            // 서브타이틀 등장
            tl.to('.subtitle', {
                opacity: 1,
                y: -15,
                duration: 1.5,
                ease: "power3.out"
            });

            // 메인 타이틀 글자들이 순차적으로 솟아오름
            tl.to('.char', {
                y: 0,
                opacity: 1,
                duration: 1.0, // 나타나는 시간을 살짝 늘림
                stagger: 0.12, // 글자 간격 조정
                ease: "back.out(1.8)", // 더 탄력있게
                onComplete: () => {
                    // 글자들이 다 나타난 후 반짝임 효과를 한 번씩 순차적으로 실행
                    gsap.to('.char', {
                        scale: 1.25, // 살짝 커짐
                        textShadow: "0 0 35px rgba(255, 255, 255, 1)", // 강한 반짝임
                        duration: 0.5,
                        stagger: {
                            each: 0.06, // 반짝임 순차 진행
                            yoyo: true, // 다시 기본값으로 돌아옴 (반짝임 펄스)
                            repeat: 1 // 한 번 더 반복하여 강조
                        },
                        ease: "sine.inOut"
                    });
                }
            }, "-=1.2"); // 서브타이틀 애니메이션이 끝나기 1.2초 전에 시작

            // Click to skip
            document.body.addEventListener('click', () => {
                window.location.href = "main.html";
            });
            document.body.style.cursor = "pointer";
        });
    </script>
</body>
</html>
